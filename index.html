<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  background: #fff5f7;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  transition: 0.5s;
}

/* DARK MODE */
.dark {
  background: #1a1a1a;
  color: white;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: #ff6b81;
  animation: float linear infinite;
}

@keyframes float {
  from { transform: translate3d(0,100vh,0); opacity: 1; }
  to { transform: translate3d(0,-10vh,0); opacity: 0; }
}

/* Container */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Window */
.window {
  background: #ffe4e9;
  border: 4px solid #ff8fa3;
  padding: 20px;
  width: 300px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255, 143, 163, 0.5);
}

/* Title */
h1 {
  color: #ff4d6d;
}

/* Button */
button {
  background: #ff8fa3;
  border: none;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
  color: white;
  border-radius: 5px;
}

button:hover {
  background: #ff4d6d;
}

/* Sections */
.letter, .memory, .gallery, .loveBox {
  display: none;
  margin-top: 10px;
}

/* Typing */
.typing {
  border-right: 2px solid #ff4d6d;
  white-space: nowrap;
  overflow: hidden;
  animation: typing 3s steps(30), blink .5s infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* Confetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  background: red;
  top: 0;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <div class="window">

    <h1 class="typing">Happy Birthday 💖</h1>

    <p id="countdown"></p>

    <button onclick="openLetter()">Open 💌</button>
    <button onclick="toggleMusic()">🎵</button>
    <button onclick="toggleDark()">🌙</button>

    <!-- LETTER -->
    <div class="letter" id="letter">
      <p id="typedMessage"></p>

      <button onclick="showMemory()">First Meet 💫</button>
      <button onclick="showGallery()">Memories 📸</button>
      <button onclick="showLove()">Why I Love You 💖</button>
    </div>

    <!-- MEMORY -->
    <div class="memory" id="memory">
      <p>That day... changed everything ❤️</p>
    </div>

    <!-- GALLERY -->
    <div class="gallery" id="gallery">
      <img id="slide" src="https://picsum.photos/300/200?1">
    </div>

    <!-- LOVE GENERATOR -->
    <div class="loveBox" id="loveBox">
      <p id="loveText"></p>
      <button onclick="nextLove()">Next 💕</button>
    </div>

  </div>
</div>

<script>
// HEARTS
for (let i = 0; i < 30; i++) {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (4 + Math.random() * 3) + "s";
  document.body.appendChild(h);
}

// CONFETTI
function confetti() {
  for (let i = 0; i < 50; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

// LETTER OPEN
function openLetter(){
  document.getElementById("letter").style.display="block";
  confetti();
  typeMessage();
}

// TYPING MESSAGE
const msg = "Happy Birthday my love ❤️ You are my happiness, my peace, my everything 💖";
let i = 0;
function typeMessage(){
  let el = document.getElementById("typedMessage");
  let interval = setInterval(()=>{
    el.innerHTML += msg[i];
    i++;
    if(i>=msg.length) clearInterval(interval);
  },50);
}

// MEMORY
function showMemory(){
  document.getElementById("memory").style.display="block";
}

// GALLERY
const images = [
  "https://picsum.photos/300/200?1",
  "https://picsum.photos/300/200?2",
  "https://picsum.photos/300/200?3"
];
let index = 0;

function showGallery(){
  let g = document.getElementById("gallery");
  g.style.display="block";
  setInterval(()=>{
    index=(index+1)%images.length;
    document.getElementById("slide").src=images[index];
  },2000);
}

// LOVE REASONS
const reasons = [
  "Your smile 😍",
  "Your voice 🎶",
  "Your kindness 💖",
  "Everything about you ✨"
];

function showLove(){
  document.getElementById("loveBox").style.display="block";
  nextLove();
}

function nextLove(){
  let r = reasons[Math.floor(Math.random()*reasons.length)];
  document.getElementById("loveText").innerText = r;
}

// MUSIC
function toggleMusic(){
  let m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark");
}

// COUNTDOWN (next birthday)
const target = new Date(new Date().getFullYear()+1,0,1);
setInterval(()=>{
  let now = new Date();
  let diff = target - now;
  let d = Math.floor(diff/1000/60/60/24);
  document.getElementById("countdown").innerText =
    "Next birthday in " + d + " days 🎂";
},1000);
</script>

</body>
</html>
