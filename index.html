<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<title>Happy Birthday ❤️</title>  
  
<style>  
body {  
  margin: 0;  
  background: #fff5f7;  
  font-family: 'Courier New', monospace;  
  overflow: hidden;  
  transition: 0.5s;  
}  
  
.dark {  
  background: #1a1a1a;  
  color: white;  
}  

/* 💌 INTRO SCREEN */
.intro {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff5f7;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  transition: 1s;
}

.intro img {
  width: 120px;
  cursor: pointer;
  transition: 0.3s;
}

.intro img:hover {
  transform: scale(1.1);
}

.intro h2 {
  margin-top: 10px;
  color: #ff4d6d;
}

/* Hide main at start */
.main {
  display: none;
}

.heart {  
  position: absolute;  
  color: #ff6b81;  
  animation: float linear infinite;  
  opacity: 0.8;  
}  
  
@keyframes float {  
  from { transform: translate3d(0,100vh,0); opacity: 1; }  
  to { transform: translate3d(0,-10vh,0); opacity: 0; }  
}  
  
.container {  
  position: absolute;  
  top: 50%;  
  left: 50%;  
  transform: translate(-50%, -50%);  
}  
  
.window {  
  background: #ffe4e9;  
  border: 4px solid #ff8fa3;  
  padding: 20px;  
  width: 300px;  
  text-align: center;  
  box-shadow: 0 0 20px rgba(255, 143, 163, 0.5);  
  border-radius: 12px;  
  animation: fadeIn 1.5s ease;  
}  
  
@keyframes fadeIn {  
  from {opacity:0; transform: translate(-50%, -60%);}  
  to {opacity:1; transform: translate(-50%, -50%);}  
}  
  
h1 {  
  color: #ff4d6d;  
  animation: glow 2s infinite alternate;  
}  
  
@keyframes glow {  
  from { text-shadow: 0 0 5px #ff8fa3; }  
  to { text-shadow: 0 0 15px #ff4d6d; }  
}  
  
button {  
  background: #ff8fa3;  
  border: none;  
  padding: 10px;  
  margin: 5px;  
  cursor: pointer;  
  color: white;  
  border-radius: 5px;  
  transition: 0.3s;  
}  
  
button:hover {  
  background: #ff4d6d;  
  transform: scale(1.05);  
}  
  
.letter, .memory, .gallery, .loveBox {  
  display: none;  
  margin-top: 10px;  
  animation: fadeIn 1s ease;  
}  
  
.typing {  
  border-right: 2px solid #ff4d6d;  
  white-space: nowrap;  
  overflow: hidden;  
  animation: typing 3s steps(30), blink .5s infinite;  
}  
  
@keyframes typing {  
  from { width: 0 }  
  to { width: 100% }  
}  
  
@keyframes blink {  
  50% { border-color: transparent }  
}  
  
.gallery img {  
  border-radius: 10px;  
}  
  
.confetti {  
  position: fixed;  
  width: 8px;  
  height: 8px;  
  top: 0;  
  animation: fall 3s linear forwards;  
}  
  
@keyframes fall {  
  to { transform: translateY(100vh) rotate(360deg); }  
}  
  
.quote {  
  font-size: 12px;  
  margin-top: 8px;  
  color: #ff4d6d;  
}  
</style>  
</head>  
  
<body>  

<!-- 💌 INTRO SCREEN -->
<div class="intro" id="intro">
  <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" onclick="enterSite()">
  <h2>♡ Letter For You ♡</h2>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="main">

<audio id="music" autoplay loop>  
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">  
</audio>  
  
<div class="container">  
  <div class="window">  
  
    <h1 class="typing">Happy Birthday 💖</h1>  
  
    <p id="countdown"></p>  
    <div class="quote" id="quote"></div>  
  
    <button onclick="openLetter()">Open 💌</button>  
    <button onclick="toggleMusic()">🎵</button>  
    <button onclick="toggleDark()">🌙</button>  
  
    <div class="letter" id="letter">  
      <p id="typedMessage"></p>  
  
      <button onclick="showMemory()">First Meet 💫</button>  
      <button onclick="showGallery()">Memories 📸</button>  
      <button onclick="showLove()">Why I Love You 💖</button>  
    </div>  
  
    <div class="memory" id="memory">  
      <p id="memoryText"></p>  
    </div>  
  
    <div class="gallery" id="gallery">  
      <img id="slide" src="https://picsum.photos/300/200?1">  
    </div>  
  
    <div class="loveBox" id="loveBox">  
      <p id="loveText"></p>  
      <button onclick="nextLove()">Next 💕</button>  
    </div>  
  
  </div>  
</div>  

</div>  
  
<script>  

// 💌 ENTER SITE
function enterSite(){
  document.getElementById("intro").style.opacity = "0";
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";
  },800);
}

// Hide sections
function hideAll(){
  memory.style.display="none";
  gallery.style.display="none";
  loveBox.style.display="none";
}

// Hearts
for (let i = 0; i < 40; i++) {  
  let h = document.createElement("div");  
  h.className = "heart";  
  h.innerHTML = "❤";  
  h.style.left = Math.random() * 100 + "vw";  
  h.style.animationDuration = (4 + Math.random() * 4) + "s";  
  document.body.appendChild(h);  
}  

function openLetter(){
  hideAll();
  letter.style.display="block";
  confetti();
  typeMessage();
}

function confetti(){
  for(let i=0;i<80;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

const msg="Happy Birthday my love ❤️\nYou are my happiness...";
let i=0;

function typeMessage(){
  typedMessage.innerHTML="";
  i=0;
  let t=setInterval(()=>{
    typedMessage.innerHTML+=msg[i]=="\n"?"<br>":msg[i];
    i++;
    if(i>=msg.length) clearInterval(t);
  },40);
}

function showMemory(){
  hideAll();
  memory.style.display="block";
}

function showGallery(){
  hideAll();
  gallery.style.display="block";
}

function showLove(){
  hideAll();
  loveBox.style.display="block";
}

function nextLove(){
  const r=["Your smile 😍","Your voice 🎶","Everything ❤️"];
  loveText.innerText=r[Math.floor(Math.random()*r.length)];
}

function toggleMusic(){
  music.paused?music.play():music.pause();
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

</script>  
  
</body>  
</html>
