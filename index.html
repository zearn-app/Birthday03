<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>
<style>
body {
  margin: 0;
  background: #fff5f7;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: #ff6b81;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* Center container */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* Window style */
.window {
  background: #ffe4e9;
  border: 4px solid #ff8fa3;
  padding: 20px;
  width: 300px;
  box-shadow: 0 0 20px rgba(255, 143, 163, 0.5);
}

/* Title */
h1 {
  color: #ff4d6d;
}

/* Button */
button {
  background: #ff8fa3;
  border: none;
  padding: 10px 20px;
  margin-top: 10px;
  cursor: pointer;
  color: white;
  font-weight: bold;
  border-radius: 5px;
  transition: 0.3s;
}

button:hover {
  background: #ff4d6d;
}

/* Letter */
.letter {
  display: none;
  margin-top: 15px;
  font-size: 14px;
  color: #333;
}

/* Typing text */
.typing {
  border-right: 2px solid #ff4d6d;
  white-space: nowrap;
  overflow: hidden;
  animation: typing 4s steps(40), blink .5s infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  50% { border-color: transparent }
}
</style>
</head>

<body>

<!-- Floating Hearts -->
<script>
for(let i=0;i<50;i++){
  let heart = document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(3+Math.random()*3)+"s";
  heart.style.fontSize=(10+Math.random()*20)+"px";
  document.body.appendChild(heart);
}
</script>

<div class="container">
  <div class="window">
    <h1 class="typing">Happy Birthday 💖</h1>

    <p>Will you open this letter? 💌</p>

    <button onclick="openLetter()">Open</button>

    <div class="letter" id="letter">
      <p>
        Happy Birthday my love ❤️<br><br>
        You are the most beautiful part of my life.<br>
        Every moment with you feels magical ✨<br><br>
        I hope today brings you endless smiles 😊<br>
        and all the happiness you deserve 💕<br><br>
        I love you forever 💖
      </p>
    </div>
  </div>
</div>

<script>
function openLetter(){
  document.getElementById("letter").style.display="block";
}
</script>

</body>
</html>
