<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  background: #fff5f7;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  transition: 0.5s;
}

/* DARK MODE */
.dark {
  background: #1a1a1a;
  color: white;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: #ff6b81;
  animation: float linear infinite;
  opacity: 0.8;
}

@keyframes float {
  from { transform: translate3d(0,100vh,0); opacity: 1; }
  to { transform: translate3d(0,-10vh,0); opacity: 0; }
}

/* Container */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Window */
.window {
  background: #ffe4e9;
  border: 4px solid #ff8fa3;
  padding: 20px;
  width: 300px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255, 143, 163, 0.5);
  border-radius: 12px;
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translate(-50%, -60%);}
  to {opacity:1; transform: translate(-50%, -50%);}
}

/* Title */
h1 {
  color: #ff4d6d;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #ff8fa3; }
  to { text-shadow: 0 0 15px #ff4d6d; }
}

/* Button */
button {
  background: #ff8fa3;
  border: none;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
  color: white;
  border-radius: 5px;
  transition: 0.3s;
}

button:hover {
  background: #ff4d6d;
  transform: scale(1.05);
}

/* Sections */
.letter, .memory, .gallery, .loveBox {
  display: none;
  margin-top: 10px;
  animation: fadeIn 1s ease;
}

/* Typing */
.typing {
  border-right: 2px solid #ff4d6d;
  white-space: nowrap;
  overflow: hidden;
  animation: typing 3s steps(30), blink .5s infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* Gallery */
.gallery img {
  border-radius: 10px;
  transition: 0.5s;
}

/* Confetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: 0;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg); }
}

/* Romantic quote */
.quote {
  font-size: 12px;
  margin-top: 8px;
  color: #ff4d6d;
  opacity: 0.8;
}
</style>
</head>

<body>

<audio id="music" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <div class="window">

    <h1 class="typing">Happy Birthday 💖</h1>

    <p id="countdown"></p>
    <div class="quote" id="quote"></div>

    <button onclick="openLetter()">Open 💌</button>
    <button onclick="toggleMusic()">🎵</button>
    <button onclick="toggleDark()">🌙</button>

    <!-- LETTER -->
    <div class="letter" id="letter">
      <p id="typedMessage"></p>

      <button onclick="showMemory()">First Meet 💫</button>
      <button onclick="showGallery()">Memories 📸</button>
      <button onclick="showLove()">Why I Love You 💖</button>
    </div>

    <!-- MEMORY -->
    <div class="memory" id="memory">
      <p id="memoryText"></p>
    </div>

    <!-- GALLERY -->
    <div class="gallery" id="gallery">
      <img id="slide" src="https://picsum.photos/300/200?1">
    </div>

    <!-- LOVE -->
    <div class="loveBox" id="loveBox">
      <p id="loveText"></p>
      <button onclick="nextLove()">Next 💕</button>
    </div>

  </div>
</div>

<script>
// HEARTS
for (let i = 0; i < 40; i++) {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (4 + Math.random() * 4) + "s";
  document.body.appendChild(h);
}

// CONFETTI
function confetti() {
  for (let i = 0; i < 80; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

// LETTER OPEN
function openLetter(){
  document.getElementById("letter").style.display="block";
  confetti();
  typeMessage();
}

// TYPING MESSAGE (LONGER + EMOTIONAL)
const msg = "Happy Birthday my love ❤️\nYou are my happiness, my peace, my everything 💖\nEvery moment with you is special ✨\nI’m so lucky to have you in my life 💕";
let i = 0;

function typeMessage(){
  let el = document.getElementById("typedMessage");
  let interval = setInterval(()=>{
    el.innerHTML += msg[i] === "\n" ? "<br>" : msg[i];
    i++;
    if(i>=msg.length) clearInterval(interval);
  },40);
}

// MEMORY STORY (AUTO TYPING)
const memoryMsg = "That day we met... everything changed ❤️ It was the start of something beautiful 💫";
function showMemory(){
  let el = document.getElementById("memoryText");
  document.getElementById("memory").style.display="block";
  el.innerHTML="";
  let i=0;
  let interval=setInterval(()=>{
    el.innerHTML+=memoryMsg[i];
    i++;
    if(i>=memoryMsg.length) clearInterval(interval);
  },40);
}

// GALLERY AUTO SLIDE
const images = [
  "https://picsum.photos/300/200?1",
  "https://picsum.photos/300/200?2",
  "https://picsum.photos/300/200?3"
];
let index = 0;
let galleryStarted = false;

function showGallery(){
  let g = document.getElementById("gallery");
  g.style.display="block";

  if(!galleryStarted){
    galleryStarted = true;
    setInterval(()=>{
      index=(index+1)%images.length;
      document.getElementById("slide").src=images[index];
    },2000);
  }
}

// LOVE REASONS (EXPANDED)
const reasons = [
  "Your smile 😍",
  "Your voice 🎶",
  "Your kindness 💖",
  "Your eyes ✨",
  "Your care 🥺",
  "Everything about you ❤️"
];

function showLove(){
  document.getElementById("loveBox").style.display="block";
  nextLove();
}

function nextLove(){
  let r = reasons[Math.floor(Math.random()*reasons.length)];
  document.getElementById("loveText").innerText = r;
}

// MUSIC
function toggleMusic(){
  let m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark");
}

// QUOTES ROTATION
const quotes = [
  "You are my today and all of my tomorrows 💕",
  "Every love story is beautiful, but ours is my favorite ❤️",
  "I fall for you more every day 💖"
];

setInterval(()=>{
  document.getElementById("quote").innerText =
    quotes[Math.floor(Math.random()*quotes.length)];
},3000);

// COUNTDOWN
const target = new Date(new Date().getFullYear()+1,0,1);
setInterval(()=>{
  let now = new Date();
  let diff = target - now;
  let d = Math.floor(diff/1000/60/60/24);
  document.getElementById("countdown").innerText =
    "Next birthday in " + d + " days 🎂";
},1000);

</script>

</body>
</html>
